  const VERSION = 3;
  const INTERVALS = [0,1,2,4,8,16];   // review boxes 1..5
  const DONE_INTERVAL = 30;            // periodic re-test for archived words
  const READY_BOX = 5;                 // suggest archiving at this level
  const K_PROG="vocab3:progress", K_USER="vocab3:userwords", K_SENT="vocab3:sentences", K_HIDE="vocab3:hidden", K_SET="vocab3:settings", K_HIST="vocab3:history", K_USENT="vocab3:usentences";

  let progress={}, userWords=[], sentences={}, hidden={}, usingStore="memory", userSentences=[];
  let settings={notif:false,review:true,quiz:true,learn:true,suggest:true,time:"20:00",quizFreq:"med",bgsync:false,level:"",levelPct:0,levelDate:"",lastDaily:"",lastSurprise:0,winStart:"09:00",winEnd:"21:00",interval:60,lastInterval:0,batchSize:4};
  let history={}, surprisePending=false;
  let queue=[], qIndex=0, revealed=false, sessionDone=0, activeTab="study", orderTick=0;
  function nextOrder(){ return Date.now()*1000 + (orderTick++ % 1000); }
  let quizItems=[], quizIdx=0, quizScore=0, allForms=[], editingId=null, quizWrong=[];

  const $=s=>document.querySelector(s);
  const today=()=>new Date().toISOString().slice(0,10);
  const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
  const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  /* storage: window.storage (Claude) -> browser storage (GitHub) -> memory */
  const Store={
    async get(k){
      try{ if(typeof window.storage!=="undefined"&&window.storage){ const r=await window.storage.get(k); usingStore="cloud"; return r?JSON.parse(r.value):null; } }catch(e){}
      try{ const ls=window["local"+"Storage"]; const v=ls.getItem(k); usingStore="browser"; return v?JSON.parse(v):null; }catch(e){ usingStore="memory"; return null; }
    },
    async set(k,val){
      try{ if(typeof window.storage!=="undefined"&&window.storage){ await window.storage.set(k,JSON.stringify(val),false); usingStore="cloud"; return true; } }catch(e){}
      try{ const ls=window["local"+"Storage"]; ls.setItem(k,JSON.stringify(val)); usingStore="browser"; return true; }catch(e){ usingStore="memory"; return false; }
    }
  };

  function allWords(){ return SEED.map(w=>({...w,type:"word",deriv:DERIV[w.id]||[],sents:sentences[w.id]||[]})).concat(userWords.map(w=>({...w,type:"word",sents:sentences[w.id]||w.sents||[]}))).filter(w=>!hidden[w.id]); }
  function allSentences(){ return userSentences.filter(s=>!hidden[s.id]).map(s=>({...s,type:"sent",en:s.en,ar:s.ar||"",pron:""})); }
  function allItems(){ return allWords().concat(allSentences()); }
  function sid(en){ return "s_"+String(en).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,46); }

  /* fetch JSON with direct call, then CORS-proxy fallback (helps on GitHub) */
  async function getJSON(url){
    try{ const r=await fetch(url); if(r.ok) return await r.json(); }catch(e){}
    try{ const r2=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url)); if(r2.ok) return await r2.json(); }catch(e){}
    return null;
  }

  /* text-to-speech (built into the browser, works offline) */
  function speak(text){
    try{
      if(!("speechSynthesis" in window)) return false;
      const u=new SpeechSynthesisUtterance(String(text||""));
      u.lang="en-US"; u.rate=.9;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
      return true;
    }catch(e){ return false; }
  }  function wmap(){ const m={}; allItems().forEach(w=>m[w.id]=w); return m; }
  function st(id){ if(!progress[id]) progress[id]={status:"study",box:0,nextDue:null,last:null,seen:0,correct:0}; return progress[id]; }

  async function load(){
    const p=await Store.get(K_PROG); if(p&&p.v===VERSION) progress=p.data||{};
    const u=await Store.get(K_USER); if(Array.isArray(u)) userWords=u;
    const sn=await Store.get(K_SENT); if(sn&&typeof sn==="object") sentences=sn;
    const hd=await Store.get(K_HIDE); if(hd&&typeof hd==="object") hidden=hd;
    const se=await Store.get(K_SET); if(se&&typeof se==="object") settings=Object.assign(settings,se);
    const hi=await Store.get(K_HIST); if(hi&&typeof hi==="object") history=hi;
    const us=await Store.get(K_USENT); if(Array.isArray(us)) userSentences=us;
    let changed=false;
    userWords.forEach(w=>{   // ترقية: نطق IPA قديم -> عربي
      if(w.pron && !/[\u0600-\u06FF]/.test(w.pron)){
        const clean=w.pron.replace(/[\/\[\]]/g,"").trim();
        const ar=ipaToArabic(clean);
        if(ar){ w.pron = ar + (clean?" /"+clean+"/":""); changed=true; }
      }
    });
    if(changed) await saveUser();
    allItems().forEach(w=>st(w.id));
  }
  async function saveProg(){ await Store.set(K_PROG,{v:VERSION,data:progress}); cloudPush(); }
  async function saveUser(){ await Store.set(K_USER,userWords); cloudPush(); }
  async function saveUSent(){ await Store.set(K_USENT,userSentences); cloudPush(); }
  async function saveSent(){ await Store.set(K_SENT,sentences); cloudPush(); }
  async function saveHide(){ await Store.set(K_HIDE,hidden); cloudPush(); }
  async function saveSet(){ await Store.set(K_SET,settings); cloudPush(); }
  async function saveHist(){ await Store.set(K_HIST,history); cloudPush(); }
  function logActivity(kind,n){ const t=today(); const h=history[t]||(history[t]={r:0,l:0,qc:0,qt:0}); h[kind]=(h[kind]||0)+(n||1); saveHist(); }

  function counts(){
    let study=0,review=0,done=0,due=0,ready=0; const t=today();
    allItems().forEach(w=>{ const s=st(w.id);
      if(s.status==="done") done++; else if(s.status==="review"){ review++; if(s.box>=READY_BOX) ready++; } else study++;
      if((s.status==="review"||s.status==="done")&&s.nextDue&&s.nextDue<=t) due++;
    });
    return {study,review,done,due,ready,total:allItems().length};
  }

  /* ===== shell ===== */
  function shell(){
    const c=counts(); const pct=c.total?Math.round((c.done/c.total)*100):0;

      const byId=(arr)=>{ const m={}; (arr||[]).forEach(x=>{ if(x&&x.id!=null) m[x.id]=x; }); return m; };
      const mergeArr=(loc,rem)=>Object.values(Object.assign({}, byId(rem), byId(loc)));

  /* IPA -> Arabic transliteration (client-side, no external source) */
  function ipaToArabic(ipa){
    if(!ipa) return "";
    let s=ipa.replace(/[\/\[\]ˈˌ.\s]/g,"");
    const map=[
      ["tʃ","تش"],["dʒ","ج"],["ʤ","ج"],["ʧ","تش"],
      ["aɪ","اي"],["aʊ","او"],["ɔɪ","وي"],["eɪ","ي"],["oʊ","و"],["əʊ","و"],
      ["iː","ي"],["uː","و"],["ɔː","و"],["ɑː","ا"],["ɜː","ير"],["ɛə","ير"],["eə","ير"],["ɪə","ير"],["ʊə","ور"],["aː","ا"],
      ["ɝ","ِر"],["ɚ","َر"],["ŋ","نج"],["θ","ث"],["ð","ذ"],["ʃ","ش"],["ʒ","ج"],
      ["ɪ","ِ"],["i","ي"],["ɛ","ِ"],["e","ِ"],["æ","َ"],["ʌ","َ"],["ə","َ"],["ɒ","و"],["ɑ","ا"],["ʊ","ُ"],["u","و"],["ɔ","و"],["o","و"],["a","ا"],
      ["w","و"],["j","ي"],["r","ر"],["l","ل"],["m","م"],["n","ن"],["b","ب"],["p","ب"],["t","ت"],["d","د"],["k","ك"],["g","ج"],["ɡ","ج"],["f","ف"],["v","ف"],["s","س"],["z","ز"],["h","ه"],["ʔ","ء"],["x","خ"]
    ];
    for(const pair of map){ s=s.split(pair[0]).join(pair[1]); }
    return s.replace(/[ːˑ]/g,"");
  }

  /* regular grammatical forms (auto guesses, editable) */
  function autoDerivatives(word, arPron, ar){
    const w=word.toLowerCase(); const base=arPron||""; const mn=ar||"(تلقائي)"; const out=[];
    let s3;
    if(/(s|x|z|ch|sh|o)$/.test(w)) s3=w+"es";
    else if(/[^aeiou]y$/.test(w)) s3=w.slice(0,-1)+"ies";
    else s3=w+"s";
    out.push([s3,"جمع / مضارع (هو/هي)",mn,base?base+"ز":"","صيغة تلقائية"]);
    let ing;
    if(/ee$/.test(w)) ing=w+"ing";
    else if(/e$/.test(w)&&w.length>2) ing=w.slice(0,-1)+"ing";
    else if(/[^aeiou][aeiou][^aeiouwxy]$/.test(w)&&w.length<=4) ing=w+w.slice(-1)+"ing";
    else ing=w+"ing";
    out.push([ing,"مضارع مستمر (‑ing)",mn,base?base+"ِنج":"","صيغة تلقائية"]);
    let ed;
    if(/e$/.test(w)) ed=w+"d";
    else if(/[^aeiou]y$/.test(w)) ed=w.slice(0,-1)+"ied";
    else if(/[^aeiou][aeiou][^aeiouwxy]$/.test(w)&&w.length<=4) ed=w+w.slice(-1)+"ed";
    else ed=w+"ed";
    out.push([ed,"ماضٍ (‑ed)",mn,base?base+"د":"","صيغة تلقائية"]);
    return out;
  }

  /* fetch real word-family from the internet (Datamuse + dictionary + translation) */
  function stemOf(w){
    w=w.toLowerCase();
    let s=w.replace(/(ically|ation|ition|ments|ment|ness|ably|ibly|able|ible|ively|ity|ies|ied|ing|edly|ed|ly|es|s|er|or|al|ic)$/,"");
    if(s.length<3) s=w;
    return s.slice(0, Math.max(3, Math.min(s.length,6)));
  }
  async function fetchDerivatives(word){
    const w=word.toLowerCase(); const stem=stemOf(w); let words=[];
    const j=await getJSON("https://api.datamuse.com/words?md=p&max=25&sp="+encodeURIComponent(stem)+"*");
    if(!j) return null;
    words=j.filter(x=>x.word&&x.word.indexOf(stem)===0&&/^[a-z]+$/.test(x.word)&&Math.abs(x.word.length-w.length)<=9);
    if(!words.length) return null;
    if(!words.some(x=>x.word===w)) words.unshift({word:w,tags:[]});
    else { words.sort((a,b)=> a.word===w?-1:b.word===w?1:0); }
    const posMap={n:"اسم",v:"فعل",adj:"صفة",adv:"ظرف"};
    const out=[];
    for(const x of words.slice(0,6)){
      const form=x.word; let pos=""; (x.tags||[]).forEach(t=>{ if(posMap[t]&&!pos) pos=posMap[t]; });
      let tr=""; const tj=await getJSON("https://api.mymemory.translated.net/get?q="+encodeURIComponent(form)+"&langpair=en|ar");
      if(tj&&tj.responseData&&tj.responseData.translatedText) tr=tj.responseData.translatedText;
      let pron=""; const pj=await getJSON("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(form));
      if(pj&&pj[0]){ const ph=(pj[0].phonetics||[]).find(p=>p.text); if(ph) pron=ipaToArabic(ph.text.replace(/[\/\[\]]/g,"")); }
      out.push([form, pos||"—", tr||"—", pron||"", ""]);
    }
    return out.length?out:null;
  }

  async function fetchAuto(word){
    const out={en:word,pron:"",ar:"",uses:"أُضيفت تلقائياً.",deriv:[],src:"auto"};
    let ipa="";
    const j=await getJSON("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(word));
    if(j&&j[0]){ const e=j[0];
      const ph=(e.phonetics||[]).find(p=>p.text); if(ph) ipa=ph.text.replace(/[\/\[\]]/g,"");
      const m=(e.meanings||[])[0]; if(m){ out.uses=(m.partOfSpeech||"")+(m.definitions&&m.definitions[0]?" — "+m.definitions[0].definition:""); }
    }
    const j2=await getJSON("https://api.mymemory.translated.net/get?q="+encodeURIComponent(word)+"&langpair=en|ar");
    if(j2&&j2.responseData&&j2.responseData.translatedText) out.ar=j2.responseData.translatedText;
    const arPron=ipaToArabic(ipa);
    out.pron = arPron ? (arPron + (ipa?" /"+ipa+"/":"")) : "(اكتب النطق يدوياً)";
    if(!out.ar) out.ar="(عدّل الترجمة يدوياً)";
    const net=await fetchDerivatives(word);
    if(net&&net.length){ out.deriv=net; out.derivSrc="net"; }
    else { out.deriv=autoDerivatives(word, arPron, out.ar.charAt(0)==="("?"":out.ar); out.derivSrc="auto"; }
    return out;
  }

  /* fetch common example sentences: human translation if available, else machine translation */
  async function fetchSentences(word){
    const out=[]; const seen={}; const raw=[];
    const j=await getJSON("https://tatoeba.org/en/api_v0/search?from=eng&to=ara&query="+encodeURIComponent(word)+"&sort=relevance");
    if(j){ for(const it of (j.results||[])){
      const en=(it.text||"").trim(); if(!en||seen[en]) continue; seen[en]=1;
      let ar=""; const flat=[];
      (it.translations||[]).forEach(g=>{ if(Array.isArray(g)) g.forEach(x=>flat.push(x)); else if(g) flat.push(g); });
      const a=flat.find(x=>x&&x.lang==="ara"&&x.text&&x.text.trim());
      if(a) ar=a.text.trim();
      raw.push({en, ar});
      if(raw.length>=20) break;
    }}
    if(!raw.length){   // مصدر احتياطي: أمثلة القاموس
      const dj=await getJSON("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(word));
      if(dj&&dj[0]){ (dj[0].meanings||[]).forEach(m=>(m.definitions||[]).forEach(d=>{
        if(d.example&&!seen[d.example]&&raw.length<12){ seen[d.example]=1; raw.push({en:d.example,ar:""}); }
      })); }
    }
    if(!raw.length) return null;
    for(const it of raw){
      let ar=it.ar, src="human";
      if(!ar){   // لا توجد ترجمة بشرية -> نوفّرها بترجمة آلية
        const tj=await getJSON("https://api.mymemory.translated.net/get?q="+encodeURIComponent(it.en)+"&langpair=en|ar");
        if(tj&&tj.responseData&&tj.responseData.translatedText){ ar=tj.responseData.translatedText; src="mt"; }
        else src="none";
      }
      out.push([it.en, ar||"", classifySent(it.en), src]);
    }
    return out.length?out:null;
  }

  /* ===== QUIZ (words + derivatives + sentences) ===== */
  function makeBlank(en){
    const parts=String(en).split(/(\s+)/); const idxs=[];
    parts.forEach((w,i)=>{ if(/^[A-Za-z]{3,}$/.test(w)) idxs.push(i); });
    if(!idxs.length) return null;
    const pick=idxs[Math.floor(Math.random()*idxs.length)];
    const word=parts[pick].replace(/[^A-Za-z]/g,""); const copy=parts.slice(); copy[pick]="＿＿＿";
    return {word:word, blanked:copy.join("")};
  }
  function buildPools(){
    const pool=[]; const formsSet=new Set(); const sentEns=[], sentArs=[];
    const rnd=(arr,n,not)=>{ const u=[...new Set(arr)].filter(x=>x&&x!==not); return u.sort(()=>Math.random()-0.5).slice(0,n); };
    const mk=(answer,distract,extra)=>Object.assign({answer:answer,options:[answer,...distract].sort(()=>Math.random()-0.5)},extra);
    allWords().forEach(w=>{ const s=st(w.id); if(s.status!=="review"&&s.status!=="done") return;
      formsSet.add(w.en); (w.deriv||[]).forEach(d=>formsSet.add(d[0]));
    });
    allForms=Array.from(formsSet);
    allSentences().forEach(s=>{ const ss=st(s.id); if(ss.status!=="review"&&ss.status!=="done") return; if(s.en) sentEns.push(s.en); if(s.ar) sentArs.push(s.ar); });
    allWords().forEach(w=>{ const s=st(w.id); if(s.status!=="review"&&s.status!=="done") return;
      const ar=(w.ar||"").split("؛")[0].split("،")[0].trim();
      if(ar) pool.push(mk(w.en, rnd(allForms,3,w.en), {kind:"word",label:"كلمة أساسية",q:"اختر الكلمة الإنجليزية الصحيحة:",prompt:ar,promptDir:"rtl",optDir:"ltr",wid:w.id}));
      (w.deriv||[]).forEach(d=>{ if(d[2]) pool.push(mk(d[0], rnd(allForms,3,d[0]), {kind:"deriv",label:"مشتق",q:"اختر الصيغة الإنجليزية الصحيحة:",prompt:d[2],promptDir:"rtl",optDir:"ltr",wid:w.id})); });
    });
    allSentences().forEach(s=>{ const ss=st(s.id); if(ss.status!=="review"&&ss.status!=="done") return;
      const fmts=[];
      if(s.ar && sentEns.length>=4) fmts.push("A");
      if(s.ar && sentArs.length>=4) fmts.push("C");
      const bl=makeBlank(s.en); if(bl && allForms.length>=4) fmts.push("B");
      if(!fmts.length && s.ar && sentEns.length>=2) fmts.push("A");
      if(!fmts.length) return;
      const fmt=fmts[Math.floor(Math.random()*fmts.length)];
      if(fmt==="A") pool.push(mk(s.en, rnd(sentEns,3,s.en), {kind:"sent",label:"جملة — اختر الجملة",q:"اختر الجملة الإنجليزية الصحيحة لهذه الترجمة:",prompt:s.ar,promptDir:"rtl",optDir:"ltr",wid:s.id}));
      else if(fmt==="C") pool.push(mk(s.ar, rnd(sentArs,3,s.ar), {kind:"sent",label:"جملة — اختر الترجمة",q:"اختر الترجمة الصحيحة لهذه الجملة:",prompt:s.en,promptDir:"ltr",optDir:"rtl",wid:s.id}));
      else pool.push(mk(bl.word, rnd(allForms,3,bl.word), {kind:"sent",label:"جملة — الكلمة الناقصة",q:"اختر الكلمة الناقصة في الجملة:",prompt:bl.blanked,promptDir:"ltr",optDir:"ltr",wid:s.id}));
    });
    return pool;
  }
  function startQuiz(){
    const pool=buildPools();
    if(pool.length<4){ $("#view-quiz").innerHTML=`<div class="empty"><div class="big">📝</div><h3>الاختبار يحتاج عناصر متعلَّمة</h3><p>اضغط «تعلّمتها ✓» على بعض الكلمات أو الجمل، فتدخل هنا.</p></div>`; return; }
    pool.sort(()=>Math.random()-0.5); quizItems=pool.slice(0,10); quizIdx=0; quizScore=0; quizWrong=[]; renderQuiz();
  }
  function renderQuiz(){
    const view=$("#view-quiz");
    if(quizIdx>=quizItems.length){ renderQuizResult(); return; }
    const item=quizItems[quizIdx];
    const promptHTML = item.promptDir==="ltr"

      : `<div class="q-ar">${esc(item.prompt)}</div>`;
    const kc = item.kind==="deriv"?"k-deriv":item.kind==="sent"?"k-sent":"k-word";
    view.innerHTML=`<div class="counter">السؤال ${quizIdx+1} من ${quizItems.length} · النتيجة ${quizScore}</div>

    const b=$("#opts");

  }
  function ansQuiz(btn,correct,answer,wid){

    const m=wmap(); const wrongNames=quizWrong.map(id=>m[id]?m[id].en:"").filter(Boolean);

      settings.lastDaily=t; saveSet();
      if(settings.review && c.due>0) notify("وقت المراجعة 📚","عندك "+c.due+" كلمة مستحقّة اليوم.","daily");
      else if(settings.learn && c.study>0) notify("تذكير تعلّم ✏️","تعلّم بعض الكلمات الجديدة اليوم.","daily");
      else if(settings.suggest) notify("اقتراح 💡","افتح كلماتي وراجع تقدّمك.","daily");
    }
    /* interval reminders within a time window: small batch of older words */
    if(settings.review && settings.winStart && settings.winEnd && settings.interval>0){
      const inWindow = hhmm>=settings.winStart && hhmm<=settings.winEnd;
      const gapMs=(settings.interval||60)*60000;
      if(inWindow && Date.now()-(settings.lastInterval||0)>=gapMs){
        const batch=pickReviewBatch(settings.batchSize||4);
        if(batch.length){ settings.lastInterval=Date.now(); saveSet();
          const m=wmap(); const names=batch.map(id=>(m[id]||{}).en).filter(Boolean).join("، ");
          notify("مراجعة سريعة 🔁","راجع كلمات سابقة: "+names,"batch");
          showBanner("🔁 مراجعة سريعة: "+names,()=>startReviewBatch(batch));
        }
      }
    }
    if(settings.quiz){
      const gap = settings.quizFreq==="high"?3600e3 : settings.quizFreq==="low"?6*3600e3 : 3*3600e3;
      if(Date.now()-(settings.lastSurprise||0)>gap){
        if(buildPools().length>=4){ settings.lastSurprise=Date.now(); saveSet(); surprisePending=true;
          notify("اختبار مفاجئ! ⚡","جاهز اختبار سريع لكلماتك.","surprise");
          showBanner("⚡ اختبار مفاجئ بانتظارك — اضغط للبدء",()=>{ surprisePending=false; switchTab("quiz"); startQuiz(); });
        }
      }
    }
  }
  function onOpenCheck(){
    if(!settings.notif) return;
    const c=counts();
    if(c.due>0) showBanner("📚 عندك "+c.due+" كلمة للمراجعة — اضغط للبدء",()=>switchTab("review"));
  }
  async function enableBgSync(){
    try{ if(!("serviceWorker" in navigator)) return "unsupported";
      const reg=await navigator.serviceWorker.ready;
      if(!reg||!("periodicSync" in reg)) return "unsupported";
      try{ await navigator.permissions.query({name:"periodic-background-sync"}); }catch(e){}
      await reg.periodicSync.register("review-reminder",{minInterval:12*60*60*1000});
      return "ok";
    }catch(e){ return "error"; }
  }

  function openSettings(){
    const perm=("Notification" in window)?Notification.permission:"unsupported";
    openSheet("الإعدادات والإشعارات",`
      <div class="setlbl">التطبيق</div>
      <div id="set-install"></div>
      <div class="setlbl">المزامنة بين الأجهزة</div>
      <div id="set-sync"></div>
      <div class="setrow"><b>الإشعارات</b><label class="switch"><input type="checkbox" id="s-notif" ${settings.notif&&perm==="granted"?"checked":""}><span class="slider"></span></label></div>
      <div class="setmsg" id="s-permmsg">${perm==="denied"?"الإشعارات محظورة — فعّلها من إعدادات الموقع في المتصفّح.":perm==="unsupported"?"المتصفّح لا يدعم الإشعارات.":""}</div>
      <div class="setrow"><span>وقت التذكير اليومي</span><input type="time" id="s-time" value="${settings.time}" class="tinput"></div>
      <div class="setlbl">تذكيرات بفترة وتكرار (مراجعة دفعات):</div>
      <div class="setrow"><span>من</span><input type="time" id="s-wstart" value="${settings.winStart}" class="tinput"><span>إلى</span><input type="time" id="s-wend" value="${settings.winEnd}" class="tinput"></div>
      <div class="setrow"><span>كل (دقائق)</span><input type="number" id="s-int" min="5" step="5" value="${settings.interval}" class="tinput" style="width:90px"></div>
      <div class="setrow"><span>عدد كلمات الدفعة</span><input type="number" id="s-batch" min="1" max="12" value="${settings.batchSize}" class="tinput" style="width:90px"></div>
      <div class="setlbl">أنواع الإشعارات:</div>
      <label class="chk"><input type="checkbox" id="s-review" ${settings.review?"checked":""}> تذكير المراجعة</label>
      <label class="chk"><input type="checkbox" id="s-quiz" ${settings.quiz?"checked":""}> اختبارات مفاجئة</label>
      <label class="chk"><input type="checkbox" id="s-learn" ${settings.learn?"checked":""}> تذكيرات تعلّم</label>
      <label class="chk"><input type="checkbox" id="s-suggest" ${settings.suggest?"checked":""}> اقتراحات</label>
      <div class="setrow"><span>تكرار الاختبارات المفاجئة</span><select id="s-freq" class="tinput"><option value="low" ${settings.quizFreq==="low"?"selected":""}>نادر</option><option value="med" ${settings.quizFreq==="med"?"selected":""}>متوسط</option><option value="high" ${settings.quizFreq==="high"?"selected":""}>كثير</option></select></div>
      <div class="setrow"><b>التذكير في الخلفية (تجريبي)</b><button class="pill-btn alt" id="s-bg">${settings.bgsync?"مفعّل ✓":"تفعيل"}</button></div>
      <div class="setmsg" id="s-bgmsg">يعمل على Chrome أندرويد بعد تثبيت التطبيق (حسب دعم الجهاز).</div>
      <div class="row-btns"><button class="pill-btn" id="s-save">حفظ</button><button class="pill-btn alt" id="s-test">إشعار تجريبي 🔔</button></div>`);
    refreshSettingsInstall();
    refreshSyncUI();
    document.getElementById("s-notif").onchange=async(e)=>{
      const msg=document.getElementById("s-permmsg");
      if(e.target.checked){
        const ok=await ensureNotifPerm(); settings.notif=ok;
        if(!ok){ e.target.checked=false; msg.textContent="لم يُمنح الإذن — فعّله من إعدادات الموقع في المتصفّح."; }
        else msg.textContent="الإشعارات مفعّلة ✓";
      } else { settings.notif=false; msg.textContent="الإشعارات موقّفة."; }
      await saveSet();
    };
    document.getElementById("s-bg").onclick=async()=>{ const r=await enableBgSync(); settings.bgsync=(r==="ok"); await saveSet(); const m=document.getElementById("s-bgmsg"); document.getElementById("s-bg").textContent=r==="ok"?"مفعّل ✓":"غير متاح"; m.textContent=r==="ok"?"سيحاول تذكيرك دورياً حتى والتطبيق مغلق (حسب جهازك).":r==="unsupported"?"جهازك/متصفّحك لا يدعمها — تشتغل غالباً على Chrome أندرويد بعد التثبيت.":"تعذّر التفعيل."; };
    document.getElementById("s-test").onclick=async()=>{ const ok=await ensureNotifPerm(); settings.notif=settings.notif||ok; await saveSet(); if(!(await notify("كلماتي 🔔","إشعار تجريبي — كل شي تمام!","test"))) document.getElementById("s-permmsg").textContent="فعّل الإشعارات أولاً."; };
    document.getElementById("s-save").onclick=async()=>{
      settings.time=document.getElementById("s-time").value||settings.time;
      settings.winStart=document.getElementById("s-wstart").value||settings.winStart;
      settings.winEnd=document.getElementById("s-wend").value||settings.winEnd;
      settings.interval=Math.max(5,parseInt(document.getElementById("s-int").value)||settings.interval);
      settings.batchSize=Math.min(12,Math.max(1,parseInt(document.getElementById("s-batch").value)||settings.batchSize));
      settings.review=document.getElementById("s-review").checked; settings.quiz=document.getElementById("s-quiz").checked;
      settings.learn=document.getElementById("s-learn").checked; settings.suggest=document.getElementById("s-suggest").checked;
      settings.quizFreq=document.getElementById("s-freq").value; await saveSet(); closeSheet();
    };
  }

  function periodStats(days){
    const o={r:0,l:0,qc:0,qt:0,active:0}; const now=new Date();
    for(let i=0;i<days;i++){ const d=new Date(now); d.setDate(d.getDate()-i); const h=history[d.toISOString().slice(0,10)];
      if(h){ o.r+=h.r||0; o.l+=h.l||0; o.qc+=h.qc||0; o.qt+=h.qt||0; if((h.r||0)+(h.l||0)+(h.qt||0)>0) o.active++; } }
    o.quizPct=o.qt?Math.round(o.qc/o.qt*100):0; return o;
  }
  function openProgress(){
    const c=counts(); const masteryPct=c.total?Math.round(c.done/c.total*100):0;
    const day=periodStats(1), week=periodStats(7), month=periodStats(30);
    const card=(title,s,act)=>`<div class="pcard"><h4>${title}</h4><div class="pgrid"><div><b>${s.l}</b><span>تعلّمتها</span></div><div><b>${s.r}</b><span>مراجعات</span></div><div><b>${s.quizPct}%</b><span>دقة الاختبار</span></div>${act!=null?`<div><b>${act}</b><span>أيام نشطة</span></div>`:""}</div></div>`;
    const lvl=settings.level?`<div class="pcard" style="text-align:center"><h4>مستواك الحالي</h4><div style="font-size:22px;font-weight:800;color:var(--accent)">${settings.level}</div><div class="setmsg">${settings.levelPct}% · آخر تقييم ${settings.levelDate||"-"}</div></div>`:"";
    openSheet("التقدّم",`
      <div class="pcard" style="text-align:center"><h4>نسبة الإتقان الكلية</h4><div class="pbig">${masteryPct}%</div><div class="setmsg">${c.done} مُنجزة من ${c.total}</div></div>
      ${card("اليوم",day,null)}
      ${card("هذا الأسبوع (7 أيام)",week,week.active)}
      ${card("هذا الشهر (30 يوم)",month,month.active)}
      ${lvl}
      <div class="row-btns"><button class="pill-btn" id="p-level">اختبار تحديد المستوى 🎯</button></div>`);
    document.getElementById("p-level").onclick=()=>{ closeSheet(); startLevelTest(); };
  }

  /* ===== level test ===== */
  let lvlItems=[], lvlIdx=0, lvlScore=0;
  function startLevelTest(){
    const pool=[]; const forms=new Set();
    allWords().forEach(w=>{ forms.add(w.en); const a=(w.ar||"").split("؛")[0].split("،")[0].trim(); if(a) pool.push({ar:a,answer:w.en}); (w.deriv||[]).forEach(d=>{ forms.add(d[0]); if(d[2]) pool.push({ar:d[2],answer:d[0]}); }); });
    const allF=Array.from(forms);
    if(pool.length<4){ openSheet("تحديد المستوى",'<p class="setmsg" style="text-align:center">تحتاج كلمات أكثر لإجراء الاختبار.</p>'); return; }
    pool.sort(()=>Math.random()-0.5);
    lvlItems=pool.slice(0,12).map(q=>{ const d=allF.filter(x=>x!==q.answer).sort(()=>Math.random()-.5).slice(0,3); q.opts=[q.answer,...d].sort(()=>Math.random()-.5); return q; });
    lvlIdx=0; lvlScore=0; renderLevelQ();
  }
  function renderLevelQ(){
    openSheet("اختبار تحديد المستوى",'<div id="lvl-area"></div>');
    const area=document.getElementById("lvl-area");
    if(lvlIdx>=lvlItems.length){ finishLevelTest(area); return; }
    const it=lvlItems[lvlIdx];
    area.innerHTML=`<div class="counter">السؤال ${lvlIdx+1} من ${lvlItems.length}</div><div class="q-prompt">اختر الكلمة الإنجليزية الصحيحة:</div><div class="q-ar">${esc(it.ar)}</div><div id="lvl-opts"></div>`;
    const box=document.getElementById("lvl-opts");
    it.opts.forEach(o=>{ const b=document.createElement("button"); b.className="opt"; b.textContent=o; b.onclick=()=>{ document.querySelectorAll("#lvl-opts .opt").forEach(x=>x.disabled=true); document.querySelectorAll("#lvl-opts .opt").forEach(x=>{ if(x.textContent===it.answer) x.classList.add("correct"); }); if(o===it.answer) lvlScore++; else b.classList.add("wrong"); setTimeout(()=>{ lvlIdx++; renderLevelQ(); },650); }; box.appendChild(b); });
  }
  async function finishLevelTest(area){
    const pct=Math.round(lvlScore/lvlItems.length*100);
    const level= pct<40?"مبتدئ": pct<75?"متوسط":"متقدم";
    settings.level=level; settings.levelPct=pct; settings.levelDate=today(); await saveSet();
    area.innerHTML=`<div class="empty"><div class="big">🎯</div><div class="pbig">${pct}%</div><h3>مستواك: ${level}</h3><p>أجبت ${lvlScore} من ${lvlItems.length} صح.</p><button class="btn-soft" id="lvl-again">إعادة الاختبار</button></div>`;
    document.getElementById("lvl-again").onclick=startLevelTest;
  }

  function confirmReset(){
    closeModal();
    const wrap=document.createElement("div");
    wrap.innerHTML=`<div class="modal-back" id="modal-back"><div class="modal">
      <div class="modal-w" style="font-size:30px">⚠️</div>
      <p class="small">حذف <b>كل</b> البيانات نهائياً (كل الكلمات والجمل والتقدّم — حتى الكلمات الأساسية) والبدء بقائمة فاضية تماماً؟ لا يمكن التراجع.</p>
      <div class="row-btns" style="justify-content:center">
        <button class="pill-btn" id="reset-yes" style="background:var(--red);color:#fff">احذف الكل وابدأ من جديد</button>
        <button class="pill-btn alt" id="reset-no">إلغاء</button>
      </div></div></div>`;
    const node=wrap.firstElementChild; document.getElementById("app").appendChild(node);
    node.addEventListener("click",e=>{ if(e.target.id==="modal-back") closeModal(); });
    document.getElementById("reset-no").onclick=closeModal;
    document.getElementById("reset-yes").onclick=doReset;
  }
  async function doReset(){
    progress={}; userWords=[]; userSentences=[]; sentences={}; history={};
    hidden={}; SEED.forEach(w=>{ hidden[w.id]=true; });          // إخفاء الكلمات الأساسية أيضاً
    settings.level=""; settings.levelPct=0; settings.levelDate=""; settings.lastDaily=""; settings.lastSurprise=0; settings.lastInterval=0;
    await saveProg(); await saveUser(); await saveUSent(); await saveSent(); await saveHide(); await saveHist(); await saveSet();
    allItems().forEach(w=>st(w.id));
    closeModal(); activeTab="study"; shell();
  }

  document.addEventListener("click",e=>{ const s=e.target&&e.target.closest?e.target.closest("[data-spk]"):null; if(s){ e.stopPropagation(); speak(s.getAttribute("data-spk")); } });
  document.addEventListener("click",()=>document.querySelectorAll(".mark.open").forEach(x=>x.classList.remove("open")));
  function initNotifications(){
    onOpenCheck();
    notifTick();
    setInterval(notifTick,60000);
    document.addEventListener("visibilitychange",()=>{ if(!document.hidden){ onOpenCheck(); notifTick(); } });
    if(settings.bgsync){ enableBgSync(); }
  }
  load().then(()=>{ shell(); initNotifications(); try{ syncCode=localStorage.getItem(K_SYNC)||""; }catch(e){ syncCode=""; } if(syncCode) fbInit(); });
})();
</script>
